name: 薅羊毛日报

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run briefing script
        shell: pwsh
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: ./daily-briefing/douban-briefing.ps1
